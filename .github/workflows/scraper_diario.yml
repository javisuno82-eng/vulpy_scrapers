# .github/workflows/scraper_diario.yml
# ─────────────────────────────────────────────────────────────────────────────
# SCRAPERS CADA 3 DÍAS (frecuencia optimizada)
# ─────────────────────────────────────────────────────────────────────────────

name: Scrapers Supermercados (Cada 3 días)

on:
  schedule:
    # Cada 3 días a las 02:00 UTC
    # Usando expresión cron: días 1,4,7,10,13,16,19,22,25,28,31
    - cron: "0 2 1,4,7,10,13,16,19,22,25,28,31 * *"

  workflow_dispatch:
    inputs:
      scraper:
        description: "Scraper a ejecutar"
        required: false
        default: "ambos"
        type: choice
        options:
          - ambos
          - preciosdelsuper
          - radarsuper
      cadena_radar:
        description: "Cadena RadarSuper (mercadona / carrefour / todas)"
        required: false
        default: "todas"
        type: choice
        options:
          - todas
          - mercadona
          - carrefour
      test_mode:
        description: "Modo test (pocas páginas, sin escritura masiva)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  scraper-preciosdelsuper:
    name: "🏪 PreciosDelSuper (DIA, Alcampo, Consum…)"
    runs-on: ubuntu-latest
    timeout-minutes: 360

    if: >
      github.event_name == 'schedule' ||
      github.event.inputs.scraper == 'ambos' ||
      github.event.inputs.scraper == 'preciosdelsuper'

    env:
      SUPABASE_URL:   ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY:   ${{ secrets.SUPABASE_KEY }}
      CIUDAD_SCRAPER: ${{ vars.CIUDAD_SCRAPER || 'Nacional' }}

    steps:
      - name: "📥 Checkout del repositorio"
        uses: actions/checkout@v4

      - name: "🐍 Configurar Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: "📦 Instalar dependencias"
        timeout-minutes: 5
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "🔑 Verificar secretos de Supabase"
        timeout-minutes: 1
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ]; then
            echo "❌ ERROR: Los secretos SUPABASE_URL y/o SUPABASE_KEY no están configurados."
            exit 1
          fi
          echo "✅ Secretos de Supabase detectados correctamente."

      - name: "🚀 Ejecutar scraper PreciosDelSuper"
        id: run_preciosdelsuper
        timeout-minutes: 350
        continue-on-error: true
        run: |
          TEST="${{ github.event.inputs.test_mode || 'false' }}"
          if [ "$TEST" = "true" ]; then
            echo "▶️  Modo test: scrapeando solo páginas 1-5"
            python scraper_preciosdelsuper.py --pages 1 5
          else
            echo "▶️  Modo completo"
            python scraper_preciosdelsuper.py
          fi

      - name: "📤 Subir log de PreciosDelSuper"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "log-preciosdelsuper-${{ github.run_id }}"
          path: scraper.log
          if-no-files-found: warn
          retention-days: 7

      - name: "📊 Resumen PreciosDelSuper"
        if: always()
        run: |
          STATUS="${{ steps.run_preciosdelsuper.outcome }}"
          if [ "$STATUS" = "success" ]; then
            echo "### ✅ PreciosDelSuper completado con éxito" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ PreciosDelSuper finalizó con errores (outcome: $STATUS)" >> $GITHUB_STEP_SUMMARY
            echo "Consulta el log adjunto para más detalles." >> $GITHUB_STEP_SUMMARY
          fi

  scraper-radarsuper:
    name: "🛒 RadarSuper (Mercadona + Carrefour)"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: scraper-preciosdelsuper

    if: >
      always() && (
        github.event_name == 'schedule' ||
        github.event.inputs.scraper == 'ambos' ||
        github.event.inputs.scraper == 'radarsuper'
      )

    env:
      SUPABASE_URL:   ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY:   ${{ secrets.SUPABASE_KEY }}
      CIUDAD_SCRAPER: ${{ vars.CIUDAD_SCRAPER || 'Nacional' }}

    steps:
      - name: "📥 Checkout del repositorio"
        uses: actions/checkout@v4

      - name: "🐍 Configurar Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: "📦 Instalar dependencias Python"
        timeout-minutes: 5
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "🔑 Verificar secretos de Supabase"
        timeout-minutes: 1
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ]; then
            echo "❌ ERROR: Los secretos SUPABASE_URL y/o SUPABASE_KEY no están configurados."
            exit 1
          fi
          echo "✅ Secretos de Supabase detectados correctamente."

      - name: "🚀 Ejecutar scraper RadarSuper"
        id: run_radarsuper
        timeout-minutes: 110
        continue-on-error: true
        run: |
          CADENA="${{ github.event.inputs.cadena_radar || 'todas' }}"
          TEST="${{ github.event.inputs.test_mode || 'false' }}"
          CMD="python scraper_radarsuper.py --cadena $CADENA"
          [ "$TEST" = "true" ] && CMD="$CMD --test"
          echo "▶️  Ejecutando: $CMD"
          $CMD

      - name: "📤 Subir diagnóstico HTML"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "diagnostico-radarsuper-${{ github.run_id }}"
          path: diagnostico_radarsuper/
          if-no-files-found: ignore
          retention-days: 7

      - name: "📤 Subir log de RadarSuper"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "log-radarsuper-${{ github.run_id }}"
          path: scraper_radarsuper.log
          if-no-files-found: warn
          retention-days: 7

      - name: "📤 Subir resumen JSON"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "resumen-radarsuper-${{ github.run_id }}"
          path: scraper_radarsuper_resumen.json
          if-no-files-found: ignore
          retention-days: 7

      - name: "📊 Resumen RadarSuper"
        if: always()
        run: |
          STATUS="${{ steps.run_radarsuper.outcome }}"
          if [ "$STATUS" = "success" ]; then
            echo "### ✅ RadarSuper completado con éxito" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ RadarSuper finalizó con errores (outcome: $STATUS)" >> $GITHUB_STEP_SUMMARY
            echo "Consulta el log adjunto para más detalles." >> $GITHUB_STEP_SUMMARY
          fi
